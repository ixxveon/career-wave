name: CI-Frontend

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 의존성 설치
        working-directory: frontend
        run: npm ci

      - name: 빌드
        working-directory: frontend
        run: npm run build
